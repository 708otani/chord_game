<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="./style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>おとあてゲーム</title>
</head>

<body>
<h1>おとあてゲーム</h1>
<p>おとをきいて、ボタンをおしてね</p>

モード:
<select id="mode-select">
  <option value="training">トレーニング</option>
  <option value="play">さいせい</option>
</select>

レベル:
<select id="button-number">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
  <option value="4">4</option>
  <option value="5">5</option>
  <option value="6">6</option>
  <option value="7">7</option>
  <option value="8">8</option>
  <option value="9">9</option>
  <option value="10">10</option>
  <option value="11">11</option>
  <option value="12">12</option>
  <option value="13">13</option>
  <option value="14">14</option>
</select>

<div id="start-button-div">
  <button id="start-button">はじめ / やりなおし</button>
</div>

<div id="stats">
せいかい: <span id="correct-count">0</span>
ふせいかい: <span id="wrong-count">0</span>
</div>

<div id='color-button-div'>
  <button id="red-button">ドミソ<br>C</button>
  <button id="yellow-button">ドファラ<br> </button>
  <button id="blue-button">シレソ<br> </button>
  <button id="black-button">ラドファ<br> </button>
  <button id="green-button">レソシ<br> </button>
  <button id="orange-button">ミソド<br> </button>
  <button id="purple-button">ファラド<br>F</button>
  <button id="pink-button">ソシレ<br>G</button>
  <button id="brown-button">ソドミ<br> </button>
  <button id="light-green-button">ラチスミ<br>A</button>
  <button id="light-orange-button">レフィスラ<br>D</button>
  <button id="light-purple-button">ミギスシ<br>E</button>
  <button id="gray-button">ベーレファ<br>B♭</button>
  <button id="light-blue-button">エスソベー<br>E♭</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
const piano = new Tone.Sampler({
  urls: {
    "A3": "A3.mp3",
    "C4": "C4.mp3",
    "D#4": "Ds4.mp3",
    "F#4": "Fs4.mp3",
    "A4": "A4.mp3",
    "C5": "C5.mp3",
    "D#5": "Ds5.mp3"
  },
  baseUrl: "https://tonejs.github.io/audio/salamander/"
}).toDestination();

const buttons = [
  "red-button","yellow-button","blue-button","black-button",
  "green-button","orange-button","purple-button","pink-button",
  "brown-button","light-green-button","light-orange-button",
  "light-purple-button","gray-button","light-blue-button"
];

const chords = [
  ['C4','E4','G4'],['C4','F4','A4'],['B3','D4','G4'],
  ['A3','C4','F4'],['D4','G4','B4'],['E4','G4','C5'],
  ['F4','A4','C5'],['G4','B4','D5'],['G4','C5','E5'],
  ['A3','C#4','E4'],['D4','F#4','A4'],['E4','G#4','B4'],
  ['A#3','D4','F4'],['D#4','G4','A#4']
];

let currentChordIndex = -1;
let gameLevel = 1;
let correctCount = 0;
let wrongCount = 0;
let mode = "training";
let gameStarted = false;

function playChord(index) {
  chords[index].forEach(n => piano.triggerAttackRelease(n, "1n"));
}

function playRandomChord() {
  currentChordIndex = Math.floor(Math.random() * gameLevel);
  playChord(currentChordIndex);
}

function blinkCorrectButton(cycletime) {
  const btn = document.getElementById(buttons[currentChordIndex]);
  let count = 0;
  const interval = setInterval(() => {
    btn.style.opacity = (btn.style.opacity == "0.3") ? "1" : "0.3";
    count++;
    if (count > 6) {
      clearInterval(interval);
      btn.style.opacity = "1";
    }
  }, cycletime);
}

function correct() {
  correctCount++;
  updateScore();
  blinkCorrectButton(100);
  setTimeout(playRandomChord, 800);
}

function wrong() {
  wrongCount++;
  updateScore();
  blinkCorrectButton(200);

  setTimeout(playRandomChord, 1200);
}

function updateScore() {
  document.getElementById("correct-count").textContent = correctCount;
  document.getElementById("wrong-count").textContent = wrongCount;
}

document.getElementById('mode-select').addEventListener('change', async (e) => {
  mode = e.target.value;
  gameStarted = false;

  const stats = document.getElementById("stats");
  const startBtn = document.getElementById("start-button");

  if (mode === "play") {
    stats.style.display = "none";
    startBtn.style.display = "none";
  } else {
    stats.style.display = "block";
    startBtn.style.display = "block";
  }
});

document.getElementById('start-button').addEventListener('click', async () => {
  await Tone.start();
  await Tone.loaded();

  correctCount = 0;
  wrongCount = 0;
  updateScore();

  gameStarted = true;

  if (mode === "training") {
    playRandomChord();
  }
});

for (let i = 0; i < buttons.length; i++) {
  document.getElementById(buttons[i]).addEventListener('click', () => {

    if (mode === "play") {
      playChord(i);
      return;
    }

    if (!gameStarted) return;

    if (currentChordIndex == i) {
      correct();
    } else {
      wrong();
    }
  });
}

document.getElementById('button-number').addEventListener('change', () => {
  const value = document.getElementById('button-number').value;
  gameLevel = value;
  gameStarted = false;

  const chil = document.getElementById('color-button-div').childNodes;
  let but = 0;
  for (let i = 0; i < chil.length; i++) {
    if (chil[i].tagName == 'BUTTON') {
      but++;
      chil[i].removeAttribute("hidden");
      if (but > value) {
        chil[i].setAttribute("hidden", "hidden");
      }
    }
  }
});

document.addEventListener("DOMContentLoaded", () => {
  const chil = document.getElementById('color-button-div').childNodes;
  let but = 0;
  for (let i = 0; i < chil.length; i++) {
    if (chil[i].tagName === 'BUTTON') {
      but++;
      if (but > 1) {
        chil[i].setAttribute("hidden", "hidden");
      }
    }
  }
  const modeInit = document.getElementById('mode-select').value;
  if (modeInit === "play") {
    document.getElementById("stats").style.display = "none";
    document.getElementById("start-button").style.display = "none";
  }
});
</script>
</body>
</html>
